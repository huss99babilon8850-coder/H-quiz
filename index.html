<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الاختبار النبوي التخصصي - المستوى الحرج</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; }
        .hadith-text { font-family: 'Amiri', serif; color: #fecdd3; }
        .correct-choice { background-color: #16a34a !important; border-color: #22c55e !important; color: white !important; }
        .wrong-choice { background-color: #dc2626 !important; border-color: #ef4444 !important; color: white !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="quiz-container" class="bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl p-8 max-w-2xl w-full">
        <!-- Start Screen -->
        <div id="start-screen" class="text-center">
            <div class="inline-block bg-rose-950 text-rose-300 px-4 py-1 rounded-full text-sm font-bold mb-4 border border-rose-800">مستوى: دقة متناهية 🎯</div>
            <h1 class="text-3xl font-bold text-rose-100 mb-6">الاختبار التخصصي في متون الأحاديث</h1>
            <p class="text-slate-400 mb-8 text-lg">30 سؤالاً تفاعلياً مع تصحيح فوري بالألوان (أخضر/أحمر). الدرجة من 60.</p>
            <button onclick="startQuiz()" class="bg-rose-700 text-white px-10 py-3 rounded-full text-xl font-bold hover:bg-rose-600 transition shadow-lg">ابدأ التحدي الفوري</button>
        </div>

        <!-- Question Screen -->
        <div id="question-screen" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <span class="text-rose-400 font-bold" id="question-number">سؤال 1 من 30</span>
                <span class="bg-rose-950 text-rose-300 border border-rose-800 px-3 py-1 rounded-full text-sm font-bold" id="score-display">الدرجة: 0</span>
            </div>
            
            <div class="mb-8">
                <h2 id="question-text" class="text-2xl font-bold text-gray-200 mb-6 hadith-text leading-relaxed"></h2>
                <div id="options-container" class="grid grid-cols-1 gap-4">
                    <!-- Options will be injected here -->
                </div>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden text-center">
            <h1 class="text-4xl font-bold text-rose-400 mb-4">حصيلة التحدي</h1>
            <div class="text-6xl font-black text-rose-100 mb-6" id="final-score"></div>
            <p class="text-xl text-slate-300 mb-8 px-4" id="result-comment"></p>
            <button onclick="location.reload()" class="bg-slate-800 text-slate-200 px-8 py-2 rounded-full font-bold hover:bg-slate-700 transition border border-slate-700">إعادة المحاولة</button>
        </div>
    </div>

    <script>
        const questions = [
            { q: "قال ﷺ: «خمس صلوات في اليوم والليلة» فقال: هل عليّ غيرها؟ قال: «لا، إلا أن...» الضبط اللفظي الدقيق للكلمة الأخيرة في المتن هو:", options: ["تَطَوَّعَ", "تَتَطَوَّعَ", "تَطَّوَّعَ", "تُطُوِّعَ"], correct: 0 },
            { q: "قال ﷺ: «الإيمان بضع وستون...» اللفظ المعتمد في نص الحديث المرفوع هو:", options: ["جزءاً", "شعبةً", "باباً", "علامةً"], correct: 1 },
            { q: "قال ﷺ في خروج أهل الإيمان من النار: «فَيُخْرَجُونَ مِنْهَا قَدِ...»", options: ["تَفَحَّمُوا", "احْتَرَقُوا", "اسْوَدُّوا", "امْتَلأُوا دُخَاناً"], correct: 2 },
            { q: "قال ﷺ في النهر الذي ينبت فيه أهل النار: «فَيَنْبُتُونَ كَمَا تَنْبُتُ الْحِبَّةُ فِي...»", options: ["طِينِ الأَرْضِ", "جَانِبِ السَّيْلِ", "مَجْرَى الْمَاءِ", "مَنْبِتِ الْكَلأِ"], correct: 1 },
            { q: "قال ﷺ في وصف نبات أهل الإيمان من نهر الحياة: «أَلَمْ تَرَ أَنَّهَا تَخْرُجُ...»", options: ["خَضْرَاءَ نَاضِرَةً", "صَفْرَاءَ مُلْتَوِيَةً", "بَيْضَاءَ نَقِيَّةً", "صَغِيرَةً ضَعِيفَةً"], correct: 1 },
            { q: "قال ﷺ في فضل الوضوء: «مَنْ تَوَضَّأَ نَحْوَ وُضُوئِي هَذَا ثُمَّ صَلَّى رَكْعَتَيْنِ... غُفِرَ لَهُ مَا تَقَدَّمَ مِنْ ذَنْبِهِ»", options: ["لَا يُحَدِّثُ فِيهِمَا نَفْسَهُ", "مُخْلِصاً فِيهِمَا قَلْبُهُ", "خَاشِعاً فِيهِمَا لِلَّهِ", "لَا يَلْتَفِتُ فِيهِمَا"], correct: 0 },
            { q: "قال ﷺ عن عذاب القبر: «إِنَّهُمَا لَيُعَذَّبَانِ، وَمَا يُعَذِّبَانِ فِي كَبِيرٍ؛ أَمَّا أَحَدُهُمَا فَكَانَ...»", options: ["لَا يَتَطَهَّرُ مِنَ الْغَائِطِ", "لَا يَسْتَبْرِئُ مِنَ الْبَوْلِ", "لَا يَتَوَضَّأُ لِلصَّلاةِ", "لَا يَغْسِلُ ثَوْبَهُ"], correct: 1 },
            { q: "قال ﷺ في تمام حديث عذاب القبر بعد غرز الجريدة: «لَعَلَّهُ يُخَفَّفُ عَنْهُمَا...»", options: ["إِلَى يَوْمِ الْقِيَامَةِ", "بِبَرَكَةِ شَفَاعَتِي", "مَا لَمْ يَيْبَسَا", "مَا دَامَتَا رَطْبَتَيْنِ"], correct: 2 },
            { q: "في حديث المسيء صلاته، قال ﷺ: «إِذَا قُمْتَ إِلَى الصَّلَاةِ فَكَبِّرْ ثُمَّ اقْرَأْ مَا تَيَسَّرَ مَعَكَ مِنَ الْقُرْآنِ، ثُمَّ ارْكَعْ حَتَّى...»", options: ["تَسْكُنَ رَاكِعاً", "Tَطْمَئِنَّ رَاكِعاً", "تَخْشَعَ رَاكِعاً", "يَعْتَدِلَ ظَهْرُكَ"], correct: 1 },
            { q: "قال ﷺ في وصف التشهد: «فَإِذَا جَلَسَ أَحَدُكُمْ فِي الصَّلَاةِ فَلْيَقُلِ...»", options: ["التَّحِيَّاتُ الْمُبَارَكَاتُ لله", "التَّحِيَّاتُ لِلَّهِ وَالصَّلَوَاتُ وَالطَّيِّبَاتُ", "الْحَمْدُ لِلَّهِ وَالتَّحِيَّاتُ لِلَّهِ", "التَّحِيَّاتُ الطَّيِّبَاتُ الزَّاكِيَاتُ"], correct: 1 },
            { q: "قال ﷺ في حديث تعاقب الملائكة: «وَيَجْتَمِعُونَ فِي صَلَاةِ... وَصَلَاةِ...»", options: ["الْفَجْرِ / الْعِشَاءِ", "الظُّهْرِ / الْعَصْرِ", "الْفَجْرِ / الْعَصْرِ", "الْمَغْرِبِ / الْفَجْرِ"], correct: 2 },
            { q: "قال ﷺ في حديث تعاقب الملائكة وسؤال ربهم لهم: «كَيْفَ تَرَكْتُمْ عِبَادِي؟ فَيَقُولُونَ:...»", options: ["تَرَكْنَاهُمْ يَعْبُدُونَكَ", "تَرَكْنَاهُمْ وَهُمْ يُصَلُّونَ وَأَتَيْنَاهُمْ وَهُمْ يُصَلُّونَ", "تَرَكْنَاهُمْ فِي طَاعَتِكَ", "أَتَيْنَاهُمْ سَاجِدِينَ وَتَرَكْنَاهُمْ سَاجِدِينَ"], correct: 1 },
            { q: "قال ﷺ: «مَنْ نَسِيَ صَلَاةً فَلْيُصَلِّ إِذَا ذَكَرَهَا، لَا كَفَّارَةَ لَهَا إِلَّا ذَلِكَ،...»", options: ["فَإِنَّ اللَّهَ غَفُورٌ", "وَأَقِمِ الصَّلَاةَ لِذِكْرِي", "فَذَلِكَ حَقُّهَا", "وَلَا يَعُدْ لِمِثْلِهَا"], correct: 1 },
            { q: "قال ﷺ: «يَعْقِدُ الشَّيْطَانُ عَلَى... أَحَدُكُمْ إِذَا هُوَ نَامَ ثَلَاثَ عُقَدٍ»", options: ["قَافِيَةِ رَأْسِ", "نَاصِيَةِ", "قَلْبِ", "عَيْنَيْ"], correct: 0 },
            { q: "قال ﷺ في فك عقد الشيطان: «فَإِنِ اسْتَيْقَظَ فَذَكَرَ اللَّهَ انْحَلَّتْ عُقْدَةٌ، فَإِنْ تَوَضَّأَ انْحَلَّتْ عُقْدَةٌ، فَإِنْ صَلَّى انْحَلَّتْ عُقْدَةٌ، فَأَصْبَحَ...»", options: ["سَعِيداً مُطْمَئِنّاً", "نَشِيطاً طَيِّبَ النَّفْسِ", "مُعَافَىً فِي بَدَنِهِ", "طَاهِراً نَقِيّاً"], correct: 1 },
            { q: "لما رأى ﷺ حبلاً ممدوداً لزينب تتعلق به إذا فترت، قال ﷺ:", options: ["حُلُّوهُ، لِيُصَلِّ أَحَدُكُمْ نَشَاطَهُ، فَإِذَا فَتَرَ فَلْيَقْعُدْ", "أَزِيلُوهُ، فَإِنَّ اللَّهَ لَا يَمَلُّ حَتَّى تَمَلُّوا", "اقْطَعُوهُ، صَلُّوا بِقَدْرِ الطَّاقَةِ", "اكْفِتُوهُ، لَا يُكَلِّفُ اللَّهُ نَفْساً إِلَّا وُسْعَهَا"], correct: 0 },
            { q: "قال ﷺ: «تَعَاهَدُوا الْقُرْآنَ، فَوَالَّذِي نَفْسِي بِيَدِهِ لَهُوَ أَشَدُّ... مِنَ الإِبِلِ فِي عُقُلِهَا»", options: ["تَفَلُّتاً", "ذَهَاباً", "تَفَصِّيّاً", "خُرُوجاً"], correct: 2 },
            { q: "قال ﷺ: «لَمْ يَأْذَنِ اللَّهُ لِشَيْءٍ مَا أَذِنَ لِلنَّبِيِّ أَنْ... بِالْقُرْآنِ يُرِيدُ: يَجْهَرُ بِهِ»", options: ["يَقْرَأَ", "يَتَغَنَّى", "يُرَتِّلَ", "يَجُودَ"], correct: 1 },
            { q: "رأى رجل ضبابة أو سحابة غشيته لقراءته الكهف، فذكر ذلك للنبي ﷺ فقال: «اقْرَأْ فُلَانُ فَإِنَّهَا... نَزَلَتْ لِلْقُرْآنِ»", options: ["الْمَلَائِكَةُ", "الرَّحْمَةُ", "السَّكِينَةُ", "الْبَرَكَةُ"], correct: 2 },
            { q: "قال ﷺ: «وَمَثَلُ الْمُنَافِقِ الَّذِي يَقْرَأُ الْقُرْآنَ مَثَلُ... رِيحُهَا طَيِّبٌ وَطَعْمُهَا مُرٌّ»", options: ["الْحَنْظَلَةِ", "الرَّيْحَانَةِ", "التَّمْرَةِ", "الأُتْرُجَّةِ"], correct: 1 },
            { q: "قال ﷺ: «وَمَثَلُ الْمُنَافِقِ الَّذِي لَا يَقْرَأُ الْقُرْآنَ كَمَثَلِ... لَيْسَ لَهَا رِيحٌ وَطَعْمُهَا مُرٌّ»", options: ["الرَّيْحَانَةِ", "التَّمْرَةِ", "الْحَنْظَلَةِ", "الصَّبِرِ"], correct: 2 },
            { q: "قال ﷺ: «مَثَلُ الَّذِي يَقْرَأُ الْقُرْآنَ وَهُوَ حَافِظٌ لَهُ مَعَ...»", options: ["العُلَمَاءِ وَالزُّهَّادِ", "السَّفَرَةِ الْكِرَامِ", "الْمَلَائِكَةِ الْمُقَرَّبِينَ", "الْبَرَرَةِ الأَتْقِيَاءِ"], correct: 1 },
            { q: "قال ﷺ في الاستعاذة دبر الصلاة: «اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنْ عَذَابِ الْقَبْرِ، وَأَعُوذُ بِكَ مِنْ فِتْنَةِ الْمَسِيحِ الدَّجَّالِ، وَأَعُوذُ بِكَ مِنْ فِتْنَةِ الْمَحْيَا وَفِتْنَةِ الْمَمَاتِ، اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ...»", options: ["الْهَمِّ وَالْحَزَنِ", "الْجُبْنِ وَالْبُخْلِ", "الْمَأْثَمِ وَالْمَغْرَمِ", "الْكَسَلِ وَالْفَقْرِ"], correct: 2 },
            { q: "قال ﷺ في خطبة معاذ إلى اليمن: «وَاتَّقِ دَعْوَةَ الْمَظْلُومِ، فَإِنَّهَا لَيْسَ بَيْنَهَا وَبَيْنَ اللَّهِ حِجَابٌ»، اللفظ الأول المبتدأ به قبل هذه العبارة مباشرة في نص الحديث هو:", options: ["فَإِيَّاكَ وَدَعْوَةَ", "فَاتَّقِ دَعْوَةَ", "وَاحْذَرْ دَعْوَةَ", "فَاجْتَنِبْ دَعْوَةَ"], correct: 1 },
            { q: "جاء رجل ثائر الرأس يسأل عن الإسلام فقال ﷺ: «خمس صلوات في اليوم والليلة»، اللفظ الدقيق الوارد في وصف صوت الرجل قبل دنوه هو:", options: ["يُسْمَعُ صُرَاخُهُ وَلَا يُفْهَمُ", "يُسْمَعُ دَوِيُّ صَوْتِهِ وَلَا يُفْقَهُ مَا يَقُولُ", "عَالِي الصَّوْتِ سَرِيعُ الْكَلَامِ", "يُنَادِي مِنْ مَكَانٍ بَعِيدٍ"], correct: 1 },
            { q: "قال ﷺ: «أُعْطِيتُ خَمْساً لَمْ يُعْطَهُنَّ أَحَدٌ مِنَ الأَنْبِيَاءِ قَبْلِي: نُصِرْتُ بِالرُّعْبِ مَسِيرَةَ شَهْرٍ، وَجُعِلَتْ لِيَ الأَرْضُ...»", options: ["مَسْجِداً وَطَهُوراً", "طَاهِرَةً مُبَارَكَةً", "مَوْضِعاً لِلسُّجُودِ", "طَهُوراً وَمُقَدَّسَةً"], correct: 0 },
            { q: "قال ﷺ في الحديث المذكور: «... وَكَانَ النَّبِيُّ يُبْعَثُ إِلَى قَوْمِهِ خَاصَّةً وَبُعِثْتُ إِلَى...»", options: ["الْعَالَمِينَ جَمِيعاً", "النَّاسِ كَافَّةً", "الأُمَمِ كُلِّهَا", "الْخَلْقِ أَجْمَعِينَ"], correct: 1 },
            { q: "في دعاء التهجد، قال ﷺ: «اللَّهُمَّ لَكَ الْحَمْدُ أَنْتَ نُورُ السَّمَوَاتِ وَأَرْضِ، وَلَكَ الْحَمْدُ أَنْتَ... السَّمَوَاتِ وَالأَرْضِ»", options: ["خَالِقُ", "قَيِّمُ", "مَالِكُ", "رَبُّ"], correct: 1 },
            { q: "تابع في دعاء التهجد: «أَنْتَ الْحَقُّ، وَوَعْدُكَ الْحَقُّ، وَقَوْلُكَ الْحَقُّ، وَ... حَقٌّ» اللفظ التالي لقولك الحق هو:", options: ["وَالْجَنَّةُ", "وَلِقَاؤُكَ", "وَالنَّبِيُّونَ", "وَالسَّاعَةُ"], correct: 1 },
            { q: "قال ﷺ: «لَيْسَ ذَلِكَ، إِنَّمَا هُوَ الشَّركُ، أَلَمْ تَسْمَعُوا مَا قَالَ لُقْمَانُ لِابْنِهِ وَهُوَ يَعِظُهُ...» قيلت هذه العبارة رداً على الصحابة لـمَّا شق عليهم نزول آية:", options: ["الَّذِينَ آمَنُوا وَلَمْ يَلْبِسُوا إِيمَانَهُمْ بِظُلْمٍ", "إِنَّ اللَّهَ لَا يَغْفِرُ أَنْ يُشْرَكَ بِهِ", "وَمَنْ يُشْرِكْ بِاللَّهِ فَقَدِ افْتَرَى", "إِنَّ الشِّرْكَ لَظُلْمٌ عَظِيمٌ"], correct: 0 }
        ];

        let currentQuestion = 0;
        let score = 0;
        let canAnswer = true;

        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('question-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            canAnswer = true;
            const q = questions[currentQuestion];
            document.getElementById('question-number').innerText = `سؤال ${currentQuestion + 1} من 30`;
            document.getElementById('question-text').innerText = q.q;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-right p-4 rounded-xl border border-slate-800 bg-slate-950 text-slate-300 hover:border-rose-500 hover:bg-rose-950/30 transition font-bold text-lg leading-relaxed duration-200";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(btn, index);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedButton, selectedIndex) {
            if (!canAnswer) return;
            canAnswer = false;

            const q = questions[currentQuestion];
            const optionsContainer = document.getElementById('options-container');
            const buttons = optionsContainer.getElementsByTagName('button');

            // تلوين الإجابة الصحيحة باللون الأخضر تلقائياً
            buttons[q.correct].classList.add('correct-choice');

            if (selectedIndex === q.correct) {
                score += 2;
            } else {
                // تلوين إجابة المستخدم الخاطئة باللون الأحمر
                selectedButton.classList.add('wrong-choice');
            }
            
            document.getElementById('score-display').innerText = `الدرجة: ${score}`;
            
            // الانتقال التلقائي بعد ثانية واحدة (1000 مللي ثانية) ليرى المستخدم النتيجة بالألوان
            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < questions.length) {
                    showQuestion();
                } else {
                    showResult();
                }
            }, 1200);
        }

        function showResult() {
            document.getElementById('question-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            const finalScoreElement = document.getElementById('final-score');
            finalScoreElement.innerText = `${score} / 60`;
            
            let comment = "";
            if (score === 60) comment = "مذهل! أنت حافظ متقن لمتون الأحاديث النبوية وعالم بتفاصيلها الحرفية. بارك الله فيك ونفع بك!";
            else if (score >= 50) comment = "إتقان من درجة خبير! أخطاء طفيفة جداً لا تُنقص من قوة حفظك الدقيق لمتن الحديث.";
            else if (score >= 40) comment = "نتيجة ممتازة في اختبار شديد الصعوبة، حفظك جيد جداً لولا التشابه اللفظي الحاد.";
            else if (score >= 30) comment = "اجتزت الاختبار بنجاح، ولكن الألفاظ المتقاربة تحتاج منك مراجعة وتثبيت أعمق للضبط الحرفي.";
            else comment = "الاختبار كان شديد الدقة والتشابه، ننصحك بالعودة لقراءة متون الأحاديث بتركيز على الكلمات الفريدة ثم إعادة المحاولة.";
            
            document.getElementById('result-comment').innerText = comment;
        }
    </script>
</body>
</html>
